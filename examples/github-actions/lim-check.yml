name: lim telemetry check

on:
  workflow_dispatch:
  push:
    paths:
      - "examples/**"
      - "lim.c"
      - "lim.h"
      - "Makefile"

jobs:
  telemetry-limits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build lim
        run: make lim

      - name: Check telemetry limits
        shell: bash
        run: |
          set +e
          ./lim -r examples/rules.lim --summary < examples/sample.tlm > lim-events.jsonl
          status=$?
          cat lim-events.jsonl

          {
            echo "### lim telemetry limit check"
            echo
            echo '```json'
            cat lim-events.jsonl
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          exit "$status"

      - name: Upload lim events
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lim-events
          path: lim-events.jsonl
